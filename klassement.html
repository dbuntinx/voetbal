<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro League Klassement</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@500&family=DM+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #0b0d13;
    --surface: #13161f;
    --border:  #222638;
    --border2: #2e3450;
    --text:    #dde1f0;
    --dim:     #5c6382;
    --accent:  #f5c842;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 36px 16px 60px;
  }

  header { text-align:center; margin-bottom:28px; }
  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.2rem,7vw,4rem);
    letter-spacing: 0.14em;
    color: var(--accent);
    line-height: 1;
  }
  header p { color:var(--dim); font-size:0.75rem; margin-top:5px; letter-spacing:0.1em; text-transform:uppercase; }

  /* Legend */
  .legend {
    display:flex; justify-content:center; gap:20px; margin-bottom:28px; flex-wrap:wrap;
  }
  .legend-item { display:flex; align-items:center; gap:7px; font-size:0.7rem; color:var(--dim); text-transform:uppercase; letter-spacing:0.07em; }
  .ld { width:22px; height:22px; border-radius:5px; border:2px solid transparent; }
  .ld-win  { background:#1a3a2a; border-color:#3dd68c; }
  .ld-draw { background:#3a3010; border-color:#f5c842; }
  .ld-loss { background:#3a1010; border-color:#f0544f; }
  .ld-open { background:#1e2336; border-color:#2e3450; }

  /* Col header */
  .col-header {
    max-width:960px; margin:0 auto 6px;
    display:grid;
    grid-template-columns: 32px 140px 58px 1fr 148px;
    gap:10px; padding:0 16px;
    font-size:0.6rem; color:var(--dim); text-transform:uppercase; letter-spacing:0.1em;
  }
  .col-header span:nth-child(3) { text-align:center; }

  /* Table */
  .table-wrapper {
    max-width:960px; margin:0 auto;
    display:flex; flex-direction:column; gap:8px;
  }

  .team-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: grid;
    grid-template-columns: 32px 140px 58px 1fr 148px;
    gap: 10px;
    align-items: center;
    padding: 11px 16px;
    transition: border-color 0.2s, box-shadow 0.2s;
    animation: slideUp 0.38s ease both;
    position: relative;
  }
  .team-row::before {
    content:'';
    position:absolute; left:0; top:0; bottom:0; width:3px;
    border-radius:12px 0 0 12px;
    background: var(--border2);
    transition: background 0.3s;
  }
  .team-row.rank-1::before { background: var(--accent); }
  .team-row.rank-2::before { background: #9ba8c0; }
  .team-row.rank-3::before { background: #b87333; }
  .team-row:hover { border-color:var(--border2); box-shadow:0 4px 24px rgba(0,0,0,.5); }

  @keyframes slideUp {
    from { opacity:0; transform:translateY(7px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .rank {
    font-family:'Bebas Neue',sans-serif; font-size:1.2rem;
    color:var(--dim); text-align:center; line-height:1;
  }
  .team-row.rank-1 .rank { color:var(--accent); }
  .team-row.rank-2 .rank { color:#9ba8c0; }
  .team-row.rank-3 .rank { color:#b87333; }

  .team-name {
    font-weight:700; font-size:0.9rem;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    display:flex; align-items:center; gap:8px;
  }
  .team-badge {
    width:20px; height:20px; border-radius:4px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-family:'DM Mono',monospace; font-size:0.65rem; font-weight:500;
  }

  .pts-cell { text-align:center; }
  .pts-num {
    font-family:'Bebas Neue',sans-serif; font-size:1.6rem;
    color:var(--accent); line-height:1;
  }
  .pts-sub { font-size:0.5rem; color:var(--dim); text-transform:uppercase; letter-spacing:0.07em; }

  /* Match boxes */
  .matches { display:flex; gap:4px; align-items:center; }

  .match-box {
    width:28px; height:28px; border-radius:5px; flex-shrink:0;
    cursor:pointer; border:2px solid transparent;
    display:flex; align-items:center; justify-content:center;
    font-family:'DM Mono',monospace; font-size:0.75rem; font-weight:500;
    transition: transform 0.12s, box-shadow 0.12s, filter 0.12s;
    user-select:none;
    position:relative;
  }
  .match-box:hover { transform:scale(1.18); box-shadow:0 2px 10px rgba(0,0,0,.5); filter:brightness(1.15); z-index:2; }

  /* States overlay colours */
  .match-box.open  { background:#1e2336; border-color:#2e3450; }
  .match-box.win   { border-color:#3dd68c; background:#1a3a2a; }
  .match-box.draw  { border-color:#f5c842; background:#3a3010; }
  .match-box.loss  { border-color:#f0544f; background:#3a1010; }

  .match-box .lbl {
    font-size:0.72rem;
    line-height:1;
  }

  /* Max info */
  .max-cell { display:flex; flex-direction:column; gap:3px; }
  .max-line {
    font-size:0.72rem; color:var(--dim);
    display:flex; align-items:baseline; gap:4px;
  }
  .max-line strong { font-family:'DM Mono',monospace; font-size:0.88rem; color:var(--text); font-weight:500; }
  .bpv { font-family:'Bebas Neue',sans-serif; font-size:1.1rem; letter-spacing:0.04em; }

  /* Footer */
  .footer {
    max-width:960px; margin:22px auto 0;
    display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;
  }
  .instructions { font-size:0.68rem; color:var(--dim); line-height:2; }
  .instructions b { color:var(--text); font-weight:600; }
  .reset-btn {
    padding:9px 22px; background:transparent; border:1px solid var(--border2);
    color:var(--dim); font-family:'DM Sans',sans-serif; font-size:0.72rem;
    letter-spacing:0.1em; text-transform:uppercase; border-radius:7px;
    cursor:pointer; transition:border-color 0.2s, color 0.2s; white-space:nowrap;
  }
  .reset-btn:hover { border-color:var(--dim); color:var(--text); }

  @media (max-width:700px) {
    .col-header, .team-row { grid-template-columns: 26px 1fr 50px 1fr; }
    .col-header .max-hdr, .team-row .max-cell { display:none; }
    .match-box { width:24px; height:24px; }
  }
</style>
</head>
<body>

<header>
  <h1>Klassement Tracker</h1>
  <p>Pro League · Play-off 1 · 2025–26</p>
</header>

<div class="legend">
  <div class="legend-item"><div class="ld ld-win"></div> Gewonnen (+3)</div>
  <div class="legend-item"><div class="ld ld-draw"></div> Gelijkspel (+1)</div>
  <div class="legend-item"><div class="ld ld-loss"></div> Verloren (+0)</div>
  <div class="legend-item"><div class="ld ld-open"></div> Nog te spelen</div>
</div>

<div class="col-header">
  <span></span>
  <span>Ploeg</span>
  <span>Pts</span>
  <span>Wedstrijden per speeldag →</span>
  <span class="max-hdr">Max / Beste pos.</span>
</div>

<div class="table-wrapper" id="standings"></div>

<div class="footer">
  <div class="instructions">
    Klik 1× → <b style="color:#3dd68c">Gewonnen</b> &nbsp;·&nbsp;
    2× → <b style="color:#f5c842">Gelijkspel</b> &nbsp;·&nbsp;
    3× → <b style="color:#f0544f">Verloren</b> &nbsp;·&nbsp;
    4× → Leeg
  </div>
  <button class="reset-btn" onclick="resetAll()">↺ Reset alles</button>
</div>

<script>
// ── Club definitions ──────────────────────────────────────────────────────
const TEAMS = [
  { name:"Union SG",     abbr:"U", start:11, c1:"#1B4B9E", c2:"#F5C842", ct:"#F5C842" },
  { name:"Club Brugge",  abbr:"B", start:10, c1:"#003D8F", c2:"#1a1a1a", ct:"#71b0ff" },
  { name:"STVV",         abbr:"S", start:7,  c1:"#F5C842", c2:"#1B4B9E", ct:"#1B4B9E" },
  { name:"KAA Gent",     abbr:"G", start:1,  c1:"#1B4B9E", c2:"#ffffff", ct:"#9dd4ff" },
  { name:"KV Mechelen",  abbr:"M", start:1,  c1:"#F5C842", c2:"#c0392b", ct:"#c0392b" },
  { name:"Anderlecht",   abbr:"A", start:0,  c1:"#6b2fa0", c2:"#ffffff", ct:"#d4a8ff" },
];

// Team index helpers
const U=0, C=1, S=2, G=3, M=4, A=5;

// ── Exact schedule: 10 speeldagen, 3 wedstrijden each ────────────────────
// Each fixture: [homeIdx, awayIdx]
// Speeldag boundaries used to draw separator lines between days.
const SPEELDAGEN = [
  // SD1
  [[U,S],[C,A],[G,M]],
  // SD2
  [[S,C],[M,U],[A,G]],
  // SD3
  [[M,A],[G,S],[U,C]],
  // SD4
  [[U,G],[C,M],[S,A]],
  // SD5
  [[G,C],[M,S],[A,U]],
  // SD6
  [[S,U],[M,G],[A,C]],
  // SD7
  [[C,S],[G,A],[U,M]],
  // SD8
  [[S,G],[A,M],[C,U]],
  // SD9
  [[M,C],[G,U],[A,S]],
  // SD10
  [[C,G],[U,A],[S,M]],
];

// Build per-team match list in order: [{fixtureId, opponent, isHome, speeldag}]
// fixtureId = unique string "h-a"
function buildTeamSchedules() {
  const schedules = TEAMS.map(() => []);
  SPEELDAGEN.forEach((dag, di) => {
    dag.forEach(([h, aw]) => {
      const fid = `${h}-${aw}`;
      schedules[h].push({ fixtureId:fid, opponent:aw, isHome:true,  speeldag:di });
      schedules[aw].push({ fixtureId:fid, opponent:h,  isHome:false, speeldag:di });
    });
  });
  return schedules;
}

const SCHEDULES = buildTeamSchedules();

// ── State: fixtureId → null | 'home_win' | 'draw' | 'away_win' ───────────
function allFixtureIds() {
  const ids = new Set();
  SPEELDAGEN.forEach(dag => dag.forEach(([h,aw]) => ids.add(`${h}-${aw}`)));
  return ids;
}

function emptyFixtures() {
  const f = {};
  allFixtureIds().forEach(id => f[id] = null);
  return f;
}

function loadState() {
  try { const s = localStorage.getItem('po1_v4'); return s ? JSON.parse(s) : null; } catch { return null; }
}
function saveState(f) {
  try { localStorage.setItem('po1_v4', JSON.stringify(f)); } catch {}
}

let FX = loadState();
if (!FX) FX = emptyFixtures();

// ── Points ────────────────────────────────────────────────────────────────
function matchResult(teamIdx, slot) {
  const { fixtureId, isHome } = SCHEDULES[teamIdx][slot];
  const fr = FX[fixtureId];
  if (!fr) return null;
  if (fr === 'draw') return 'draw';
  return (isHome ? fr === 'home_win' : fr === 'away_win') ? 'win' : 'loss';
}

function calcPts(t) {
  return TEAMS[t].start + SCHEDULES[t].reduce((s,_,i) => {
    const r = matchResult(t,i);
    return s + (r==='win'?3 : r==='draw'?1 : 0);
  }, 0);
}

function remainingCount(t) {
  return SCHEDULES[t].filter(m => FX[m.fixtureId] === null).length;
}

function calcMax(t) { return calcPts(t) + remainingCount(t) * 3; }

// Best position: assume T wins all remaining → T gets calcMax(t).
// For every other team O: minimum points = current calcPts(O)
// (assume O loses all remaining, including matches vs T which T wins).
// T can finish above O if calcMax(T) >= calcPts(O).
// Guaranteed above T = teams where even calcPts(O) > calcMax(T).
function bestPos(t) {
  const tMax = calcMax(t);
  let above = 0;
  TEAMS.forEach((_,i) => {
    if (i===t) return;
    if (calcPts(i) > tMax) above++;
  });
  return above + 1;
}

function getSorted() {
  return TEAMS.map((_,i)=>i).sort((a,b) => {
    const d = calcPts(b)-calcPts(a);
    return d !== 0 ? d : TEAMS[b].start - TEAMS[a].start;
  });
}

// ── Cycle fixture ─────────────────────────────────────────────────────────
const CYCLE_HOME = { null:'home_win', home_win:'draw', draw:'away_win', away_win:null };
const CYCLE_AWAY = { null:'away_win', away_win:'draw', draw:'home_win', home_win:null };

function cycleMatch(t, slot) {
  const { fixtureId, isHome } = SCHEDULES[t][slot];
  const cycle = isHome ? CYCLE_HOME : CYCLE_AWAY;
  FX[fixtureId] = cycle[FX[fixtureId]] ?? null;
  saveState(FX);
  render();
}

function resetAll() { FX = emptyFixtures(); saveState(FX); render(); }

// ── Render ────────────────────────────────────────────────────────────────
const POS_COLORS = ['#f5c842','#9ba8c0','#b87333','#5c6382','#5c6382','#5c6382'];

function render() {
  const container = document.getElementById('standings');
  const sorted = getSorted();
  container.innerHTML = '';

  sorted.forEach((t, dr) => {
    const pts  = calcPts(t);
    const mx   = calcMax(t);
    const bp   = bestPos(t);
    const rem  = remainingCount(t);
    const team = TEAMS[t];

    const row = document.createElement('div');
    row.className = `team-row rank-${Math.min(dr+1,6)}`;
    row.style.animationDelay = `${dr*0.045}s`;

    // Rank
    const rankEl = document.createElement('div');
    rankEl.className = 'rank';
    rankEl.textContent = dr+1;

    // Name + badge
    const nameEl = document.createElement('div');
    nameEl.className = 'team-name';
    const badge = document.createElement('div');
    badge.className = 'team-badge';
    badge.style.background = team.c1;
    badge.style.color = team.ct;
    badge.style.border = `1px solid ${team.c2}`;
    badge.textContent = team.abbr;
    nameEl.appendChild(badge);
    nameEl.appendChild(document.createTextNode(team.name));

    // Points
    const ptsEl = document.createElement('div');
    ptsEl.className = 'pts-cell';
    ptsEl.innerHTML = `<div class="pts-num">${pts}</div><div class="pts-sub">punten</div>`;

    // Matches
    const matchesEl = document.createElement('div');
    matchesEl.className = 'matches';

    SCHEDULES[t].forEach((m, slot) => {

      const result = matchResult(t, slot);
      const opp = TEAMS[m.opponent];
      const loc = m.isHome ? '⌂' : '✈';
      const rlabel = { win:'Gewonnen', draw:'Gelijkspel', loss:'Verloren', null:'Nog te spelen' };
      const tip = `SD${m.speeldag+1} ${loc} ${opp.name} — ${rlabel[result]}`;

      const box = document.createElement('div');
      box.className = `match-box ${result ?? 'open'}`;
      box.title = tip;
      box.addEventListener('click', () => cycleMatch(t, slot));

      // Always show opponent letter; color depends on state
      const lbl = document.createElement('span');
      lbl.className = 'lbl';
      lbl.style.color = result ? opp.ct : opp.c1;
      lbl.style.opacity = result ? '1' : '0.6';
      lbl.textContent = opp.abbr;
      box.appendChild(lbl);

      matchesEl.appendChild(box);
    });

    // Max / best pos
    const pc = POS_COLORS[Math.min(bp-1,5)];
    const posLabel = `${bp}${bp===1?'ste':'de'}`;
    const maxEl = document.createElement('div');
    maxEl.className = 'max-cell';
    maxEl.innerHTML = `
      <div class="max-line">Max: <strong>${mx}</strong> pts</div>
      <div class="max-line">Beste: <span class="bpv" style="color:${pc}">${posLabel}</span></div>
      <div class="max-line" style="font-size:.58rem;opacity:.55">${rem} wedstr. resterend</div>
    `;

    row.appendChild(rankEl);
    row.appendChild(nameEl);
    row.appendChild(ptsEl);
    row.appendChild(matchesEl);
    row.appendChild(maxEl);
    container.appendChild(row);
  });
}

render();
</script>
</body>
</html>
